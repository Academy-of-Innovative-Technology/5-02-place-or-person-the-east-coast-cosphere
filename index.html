<!doctype html>
<html data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>TEMPLATE: Country / Person Profiler</title>

    <link href="src/css/style.css" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body class="p-5">
    <div class="container-sm">
      <h1>European Countries</h1>

      <hr />
      <br />

      <div class="row container-sm p-0 m-0" id="search-bar">
        <div class="col-10 p-0">
          <input
            type="text"
            class="form-control input-lg h-100"
            id="country"
            placeholder="Search For Country"
          />
        </div>

        <div class="col-2 p-0 d-flex justify-content-center">
          <button id="Submit" type="button" class="btn btn-info btn-lg">
            <span class="glyphicon glyphicon-search" aria-hidden="true"
              >Search</span
            >
          </button>
        </div>
      </div>

      <div id="Country_Container" class="container-sm mt-5 p-0 d-flex flex-column gap-2">
        <div class="p-3 bg-dark-subtle">
          <h1 id="Name" class="text-center text-decoration-underline">Loading</h1>
          <div class="row w-100 m-0 flex-row-reverse gap-3">
            <div class="col-md p-0">
              <img id="Flag" src="" class="w-100" />
            </div>
            <div class="col-md-7 p-0">
              <h3 class="text-center text-decoration-underline">Information</h3>
              <ul class="">
                <li id="Official_Name">Official Name: Loading</li>
                <li id="Language">Language: Loading</li>
                <li id="Demonym">Demonym: Loading</li>
                <li id="Foundation">Foundation: Loading</li>
                <li id="Government_Type">
                  Government Type: Loading
                </li>
              </ul>
              <div class="row p-1 text-center w-100 gap-2 m-auto">
                  <div class="col p-1 bg-info-subtle align-content-center">
                    <h3 class="text-decoration-underline">Continent</h3>
                    <p id="Continent">Loading</p>
                  </div>
                  <div class="col p-1 bg-info-subtle align-content-center">
                    <h3 class="text-decoration-underline">Population</h3>
                    <p id="Population">Loading</p>
                  </div>
                  <div class="col p-1 bg-info-subtle align-content-center">
                    <h3 class="text-decoration-underline">Area (km²)</h3>
                    <p id="Area">Loading</p>
                  </div>
                </div>
            </div>
          </div>
        </div>
        <div class="p-3 bg-dark-subtle">
          <h2>Pictures:</h1>
          <div id="Pictures" class="d-flex flex-row flex-wrap gap-2 justify-content-center justify-content-lg-start">
            Loading
          </div>
        </div>
      </div>


    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="src/js/script.js"></script>
  </body>
</html>
