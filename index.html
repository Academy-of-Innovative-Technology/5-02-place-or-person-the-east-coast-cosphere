<!doctype html>
<html data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>TEMPLATE: Country / Person Profiler</title>

    <link href="src/css/style.css" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body class="p-5">
    <div class="container-sm">
      <h1>European Countries</h1>

      <hr />
      <br />

      <div class="row" id="search-bar">
        <div class="col-xs-10 col-sm-10 col-md-10 col-lg-10">
          <input
            type="text"
            class="form-control input-lg h-100"
            id="country"
            placeholder="Search For Country"
          />
        </div>

        <div class="col-xs-2 col-sm-2 col-md-2 col-lg-2">
          <button type="button" class="btn btn-info btn-lg">
            <span class="glyphicon glyphicon-search" aria-hidden="true"
              >Search</span
            >
          </button>
        </div>
      </div>

      <div id="Country_Container" class="container-sm mt-5 d-flex flex-column gap-2">
        <div class="p-3 bg-dark-subtle">
          <h1 class="text-center text-decoration-underline">Romania</h1>
          <div class="row w-100 m-0 flex-row-reverse gap-3">
            <div class="col-md p-0 align-content-center">
              <img src="https://flagcdn.com/ro.svg" class="w-100" />
            </div>
            <div class="col-md-7 p-0">
              <ul class="">
                <li>Official Name: Romania</li>
                <li>Language: Romanian, Italian Romanian</li>
                <li>Demonym: Romanian</li>
                <li>Foundation: January 24th, 1859</li>
                <li>
                  Government Type: Semi-presidential Representative Republic
                </li>
              </ul>
              <div class="row p-1 text-center w-100 gap-2 m-auto">
                  <div class="col p-0 bg-info-subtle align-content-center">
                    <h3 class="text-decoration-underline">Continent</h3>
                    <p>Europe</p>
                  </div>
                  <div class="col p-0 bg-info-subtle align-content-center">
                    <h3 class="text-decoration-underline">Population</h3>
                    <p>19,000,000</p>
                  </div>
                  <div class="col p-0 bg-info-subtle align-content-center">
                    <h3 class="text-decoration-underline">Area (km^2)</h3>
                    <p>238,397</p>
                  </div>
                </div>
            </div>
          </div>
        </div>
        <div class="p-3 bg-dark-subtle">
          <h2>Pictures:</h1>
          <div class="d-flex flex-row flex-wrap gap-2 justify-content-center justify-content-lg-start">
            <img style="max-width: 250px;" src="https://worldstrides.com/_next/image?url=https%3A%2F%2Fwst-p-001.sitecorecontenthub.cloud%2Fapi%2Fpublic%2Fcontent%2Fec8e87abcaeb4741a0525839d610240d%3Fv%3D43afb1e0%26ampt%3D4x3w590&w=1920&q=75">
            <img style="max-width: 250px;" src="https://worldstrides.com/_next/image?url=https%3A%2F%2Fwst-p-001.sitecorecontenthub.cloud%2Fapi%2Fpublic%2Fcontent%2Fec8e87abcaeb4741a0525839d610240d%3Fv%3D43afb1e0%26ampt%3D4x3w590&w=1920&q=75">
            <img style="max-width: 250px;" src="https://worldstrides.com/_next/image?url=https%3A%2F%2Fwst-p-001.sitecorecontenthub.cloud%2Fapi%2Fpublic%2Fcontent%2Fec8e87abcaeb4741a0525839d610240d%3Fv%3D43afb1e0%26ampt%3D4x3w590&w=1920&q=75">
            <img style="max-width: 250px;" src="https://worldstrides.com/_next/image?url=https%3A%2F%2Fwst-p-001.sitecorecontenthub.cloud%2Fapi%2Fpublic%2Fcontent%2Fec8e87abcaeb4741a0525839d610240d%3Fv%3D43afb1e0%26ampt%3D4x3w590&w=1920&q=75">
          </div>
        </div>
      </div>

      
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="src/js/script.js"></script>
  </body>
</html>
